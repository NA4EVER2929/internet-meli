name: 🗑 3-Clean Repo

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'Tag to reset to (must be >= v1.1, e.g. v1.2, v2.0)'
        required: true
        default: 'v1.3'

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag exists and is >= v1.1
        id: validate
        run: |
          BASELINE="v1.1"
          TARGET="${{ github.event.inputs.target_tag }}"

          if ! git rev-parse "$TARGET" >/dev/null 2>&1; then
            echo "❌ Tag '$TARGET' does not exist"
            exit 1
          fi

          version_ge() {
            local v1="${1#v}"
            local v2="${2#v}"
            IFS='.' read -ra arr1 <<< "$v1"
            IFS='.' read -ra arr2 <<< "$v2"
            for i in 0 1 2; do
              num1=${arr1[i]:-0}
              num2=${arr2[i]:-0}
              if (( num1 > num2 )); then
                return 0
              elif (( num1 < num2 )); then
                return 1
              fi
            done
            return 0
          }

          if version_ge "$TARGET" "$BASELINE"; then
            echo "✅ $TARGET >= $BASELINE - proceeding"
          else
            echo "❌ $TARGET is older (smaller) than $BASELINE. Aborting."
            exit 1
          fi

          HASH=$(git rev-parse "$TARGET")
          echo "target_hash=$HASH" >> $GITHUB_OUTPUT

      - name: Force reset to target tag
        run: |
          git reset --hard "${{ steps.validate.outputs.target_hash }}"
          git push --force origin HEAD:${{ github.ref_name }}
          echo "🔁 Repository force-reset to tag ${{ github.event.inputs.target_tag }} (commit ${{ steps.validate.outputs.target_hash }})"